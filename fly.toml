# Fly.io deployment config for bucketd.
#
# To deploy: install flyctl, run `fly launch --no-deploy` once to create
# the app (this file becomes the source of truth), then `fly deploy`
# whenever main moves.
#
# Two services are exposed:
#   - gRPC on :50051 (the primary API consumed by client libraries)
#   - HTTP on :8080  (/v1/allow JSON wrapper + /healthz + /metrics)
#
# Fly's built-in metrics scrape the HTTP service automatically via the
# [[metrics]] block — no extra Prometheus deployment required. Metrics
# appear in the Fly dashboard's Grafana view.

app = "bucketd"
primary_region = "sjc" # Pacific-US

[build]
  dockerfile = "Dockerfile"

[env]
  # Defaults — override here or via `fly secrets set` for sensitive values.
  ADDR = ":50051"
  HTTP_ADDR = ":8080"
  SHUTDOWN_TIMEOUT = "15s"
  # REDIS_URL is set via `fly secrets set REDIS_URL=redis://...` so the
  # production endpoint never lands in source. Without it, bucketd runs
  # with the in-memory backend (single-instance only).

# ---- gRPC service ----
[[services]]
  internal_port = 50051
  protocol = "tcp"
  auto_stop_machines = "stop"  # Fly stops idle machines; cold-start latency is ~1s
  auto_start_machines = true
  min_machines_running = 0

  [[services.ports]]
    port = 50051

  [[services.tcp_checks]]
    interval = "10s"
    timeout = "2s"

# ---- HTTP service ----
[[services]]
  internal_port = 8080
  protocol = "tcp"
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

  [[services.ports]]
    port = 80
    handlers = ["http"]
    force_https = true

  [[services.ports]]
    port = 443
    handlers = ["tls", "http"]

  [[services.http_checks]]
    interval = "10s"
    timeout = "2s"
    grace_period = "5s"
    method = "get"
    path = "/healthz"

# ---- Prometheus metrics ----
# Fly's built-in metrics scraping. Hits HTTP_ADDR/path on each instance
# every 15s and surfaces the metrics in the Fly dashboard's Grafana view.
# No external Prometheus deployment required.
[[metrics]]
  port = 8080
  path = "/metrics"

# ---- Machine sizing ----
[[vm]]
  size = "shared-cpu-1x"
  memory = "256mb"  # Memory backend cap is 100k buckets ~ 20 MB; plenty of headroom.
